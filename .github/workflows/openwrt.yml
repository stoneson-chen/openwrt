name: OpenWrt 自动编译 (x86_64 优化版)

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: 'OpenWrt 分支 (留空使用 master)'
        required: false
        default: ''
      release:
        description: '是否发布到 Releases'
        type: boolean
        default: true
      keep_releases:
        description: '保留最近几个 Release（默认 2）'
        required: false
        default: '2'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: 获取当前时间
        id: current_time
        run: echo "CURRENT_TIME=$(date '+%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV

      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            qemu-utils ca-certificates xz-utils pigz

      - name: 配置 ccache
        uses: hendrikmuhs/ccache-action@v1.2.20
        with:
          max-size: '5G'
          key: ccache-openwrt-x86-64-${{ runner.os }}-${{ hashFiles('**/feeds.conf.default', '.config') }}
          restore-keys: |
            ccache-openwrt-x86-64-${{ runner.os }}-

      - name: 克隆 OpenWrt 源码
        run: |
          BRANCH="${{ github.event.inputs.openwrt_branch || 'master' }}"
          git clone --depth=1 https://github.com/openwrt/openwrt.git -b $BRANCH openwrt

      - name: 添加第三方 feeds
        run: |
          cd openwrt
          cat >> feeds.conf.default <<EOF
          src-git openclash https://github.com/vernesong/OpenClash.git
          src-git mosdns https://github.com/sbwml/luci-app-mosdns.git
          src-git adguardhome https://github.com/stevenjoezhang/luci-app-adguardhome.git
          src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git
          src-git helloworld https://github.com/fw876/helloworld.git
          src-git lienol https://github.com/Lienol/openwrt-package.git
          EOF

      - name: 复制配置文件并强制启用必要组件
        run: |
          cd openwrt
          if [ -f "../config.openwrt.X64" ]; then
            cp "../config.openwrt.X64" .config
            echo "✅ 已加载 config.openwrt.X64"
          else
            echo "❌ 未找到 config.openwrt.X64，使用默认 x86_64 generic 配置"
            {
              echo "CONFIG_TARGET_x86=y"
              echo "CONFIG_TARGET_x86_64=y"
              echo "CONFIG_TARGET_x86_64_DEVICE_generic=y"
            } > .config
          fi

          # 辅助函数：强制设置任意配置项
          set_config() {
            local entry="$1"
            local key="${entry%%=*}"
            local value="${entry#*=}"
            if grep -q "^${key}=" .config; then
              sed -i "s|^${key}=.*|${key}=${value}|" .config
              echo "  → 已更新 ${key}=${value}"
            elif grep -q "^# ${key} is not set" .config; then
              sed -i "s|^# ${key} is not set|${key}=${value}|" .config
              echo "  → 已启用（原注释） ${key}=${value}"
            else
              echo "${key}=${value}" >> .config
              echo "  → 新增 ${key}=${value}"
            fi
          }

          echo "::group::强制设置关键配置项"
          set_config "CONFIG_PACKAGE_kmod-usb-printer=y"
          set_config "CONFIG_PACKAGE_luci-mod-admin-full=y"
          set_config "CONFIG_PACKAGE_theme-argon=y"
          set_config "CONFIG_PACKAGE_theme-openwrt-2020=y"
          set_config "CONFIG_PACKAGE_theme-openwrt=y"
          set_config "CONFIG_PACKAGE_luci-app-kodexplorer=n"
          echo "::endgroup::"

          # 修改默认时区和 NTP 服务器
          sed -i "s/set system\.\@system\[-1\]\.timezone='UTC'/set system.@system[-1].timezone='CST-8'/" ./package/base-files/files/bin/config_generate
          sed -i "s/0\.openwrt\.pool\.ntp\.org/ntp1.aliyun.com/" ./package/base-files/files/bin/config_generate
          sed -i "s/1\.openwrt\.pool\.ntp\.org/time1.cloud.tencent.com/" ./package/base-files/files/bin/config_generate
          echo "net.netfilter.nf_conntrack_max=65535" >> ./package/base-files/files/etc/sysctl.d/10-default.conf
          echo "net.ipv4.ip_forward = 1" >> ./package/base-files/files/etc/sysctl.d/10-default.conf

      - name: 更新 feeds 并生成配置
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig

      - name: 验证并自动修复配置缺失项
        run: |
          cd openwrt
          MAX_ATTEMPTS=3
          attempt=1

          # 从仓库根目录读取原始配置
          CONFIG_FILE="$GITHUB_WORKSPACE/config.openwrt.X64"

          while [ $attempt -le $MAX_ATTEMPTS ]; do
            echo "========== 配置验证尝试 #$attempt =========="
            MISSING=0
            MISSING_ITEMS=""

            # 读取原始配置，检查每个 PACKAGE 项
            while read line; do
              [[ "$line" =~ ^[[:space:]]*# ]] && continue
              [[ -z "$line" ]] && continue
              if [[ "$line" =~ ^(CONFIG_PACKAGE_[^=]+)=(.*)$ ]]; then
                key="${BASH_REMATCH[1]}"
                val="${BASH_REMATCH[2]}"
                if [[ "$val" == "y" || "$val" == "m" ]]; then
                  if grep -q "^${key}=y" .config || grep -q "^${key}=m" .config; then
                    echo "✅ $key 已启用 (值为 $(grep "^${key}=" .config | cut -d= -f2))"
                  else
                    echo "❌ $key 缺失 (期望 $val)"
                    MISSING=1
                    MISSING_ITEMS="$MISSING_ITEMS $key=$val"
                  fi
                fi
              fi
            done < "$CONFIG_FILE"

            if [ $MISSING -eq 0 ]; then
              echo "✅ 所有配置项均已正确启用"
              exit 0
            fi

            if [ $attempt -eq $MAX_ATTEMPTS ]; then
              echo "❌ 经过 $MAX_ATTEMPTS 次尝试后，仍有配置项未启用:"
              echo "$MISSING_ITEMS" | tr ' ' '\n'
              exit 1
            fi

            echo "尝试重新启用缺失项 (使用 scripts/config)..."
            for item in $MISSING_ITEMS; do
              key="${item%%=*}"
              val="${item#*=}"
              # 移除 CONFIG_ 前缀，得到如 PACKAGE_xxx 的形式
              config_opt="${key#CONFIG_}"
              echo "启用: $config_opt (设置为 $val)"
              if [ "$val" == "y" ]; then
                ./scripts/config --enable "$config_opt"
              elif [ "$val" == "m" ]; then
                ./scripts/config --module "$config_opt"
              fi
            done

            # 重新生成配置
            make defconfig
            attempt=$((attempt + 1))
          done

      - name: 下载源代码（带重试）
        run: |
          cd openwrt
          for i in {1..3}; do
            make download -j$(nproc) && break
            echo "下载失败，10秒后重试 ($i/3)"
            sleep 10
          done

      - name: 编译固件（带降级重试）
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s
          ccache -s

      - name: 验证所有需要的 apk 包已生成
        run: |
          cd openwrt
          cd bin/targets/x86/64/packages || { echo "❌ packages 目录不存在"; exit 1; }
          MISSING=0
          while read line; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "$line" ]] && continue
            if [[ "$line" =~ ^CONFIG_PACKAGE_([^=]+)=[ym]$ ]]; then
              pkg="${BASH_REMATCH[1]}"
              # 检查是否存在对应包文件（扩展名可能是 .apk 或 .ipk）
              if ls ${pkg}_*.apk >/dev/null 2>&1 || ls ${pkg}_*.ipk >/dev/null 2>&1; then
                echo "✅ ${pkg} 包已生成"
              else
                echo "❌ ${pkg} 包未生成"
                MISSING=1
              fi
            fi
          done < $GITHUB_WORKSPACE/config.openwrt.X64

          if [ $MISSING -eq 1 ]; then
            echo "错误: 部分软件包未生成"
            exit 1
          fi
          echo "所有软件包均已生成"

      - name: 钉钉通知 - 编译结束
        if: always()
        uses: ghostoy/dingtalk-action@master
        with:
          webhook: ${{ secrets.DINGTALK_WEBHOOK }}
          secret: ${{ secrets.DINGTALK_SECRET }}
          msgtype: markdown
          content: |
            {
              "title": "GitHub Workflow 通知",
              "text": "### 🔄 OpenWrt 自动编译完成\n\n- **仓库**：${{ github.repository }}\n- **分支**：${{ github.ref_name }}\n- **触发者**：${{ github.actor }}\n- **事件**：${{ github.event_name }}\n- **编译时间**：${{ env.CURRENT_TIME }}\n[查看 Actions 日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            }

      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-X64
          path: openwrt/bin/targets/x86/64/**
          retention-days: 7

      - name: 生成 SHA256 校验文件（仅固件）
        run: |
          TARGET_DIR="openwrt/bin/targets/x86/64"
          cd "$TARGET_DIR" || { echo "❌ 固件目录不存在，跳过"; exit 0; }
          echo "当前目录文件列表："
          ls -la
          find . -maxdepth 1 -type f \( \
            -name "*.img.gz" -o \
            -name "*.vmdk" -o \
            -name "*.squashfs*" -o \
            -name "openwrt-*.bin" -o \
            -name "*sysupgrade*" -o \
            -name "*.factory.*" \
          \) -exec sha256sum {} + > sha256sums.txt
          if [ -s sha256sums.txt ]; then
            echo "✅ sha256sums.txt 生成成功："
            cat sha256sums.txt
          else
            echo "⚠️ 没有找到可计算 SHA256 的固件文件，跳过生成"
          fi

      - name: 自动发布到 GitHub Releases
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: openwrt/bin/targets/x86/64/**
          tag_name: v${{ github.run_number }}
          name: OpenWrt X64 (优化版)
          body: |
            **自动编译固件**
            - 分支：${{ github.event.inputs.openwrt_branch || 'master' }}
            - 日期：2026年3月
            - 目标：x86_64 (J4125 / J5005 + 4× Intel I226 2.5G + VMware)
            - 内核：6.12（EEVDF + PREEMPT_RT 支持）
            - 特性：VMDK 镜像、MosDNS、Docker、OpenClash
            - 保留数量：${{ github.event.inputs.keep_releases }}
            - 编译时间：${{ env.CURRENT_TIME }}
          draft: false
          prerelease: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 自动清理旧 Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        run: |
          KEEP=${{ github.event.inputs.keep_releases || 2 }}
          echo "🧹 清理旧 Release，仅保留最近 $KEEP 个..."
          RELEASES=$(gh release list --limit 100 --json tagName --jq '.[].tagName')
          TOTAL=$(echo "$RELEASES" | wc -l)
          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "当前 Release 数量 ($TOTAL) 未超过保留数量，无需清理"
            exit 0
          fi
          echo "$RELEASES" | tail -n +$((KEEP+1)) | while read tag; do
            echo "删除 Release: $tag"
            gh release delete "$tag" --yes --cleanup-tag
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: OpenWrt 自动编译

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: 'OpenWrt 分支 (留空使用 master)'
        required: false
        default: ''
      release:
        description: '是否发布到 Releases'
        type: boolean
        default: true
      keep_releases:
        description: '保留最近几个 Release（默认 5）'
        required: false
        default: '5'

  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 480

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 钉钉通知 - 开始编译
        if: always()
        uses: ghostoy/dingtalk-action@master
        with:
          webhook: ${{ secrets.DINGTALK_WEBHOOK }}
          secret: ${{ secrets.DINGTALK_SECRET }}  # 如果用了加签，填这里；否则留空
          msgtype: markdown
          content: |
            ### 🔄 OpenWrt 自动编译开始
            **仓库**：${{ github.repository }}
            **分支**：${{ github.ref_name }}
            **触发者**：${{ github.actor }}
            **事件**：${{ github.event_name }}
            **时间**：$(date '+%Y-%m-%d %H:%M:%S')
            
      - name: 安装依赖 + ccache
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget ccache \
            qemu-utils  ca-certificates
            # pigz pxz xz-utils

      - name: 配置 ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: "5G"
          key: "ccache-openwrt-x86-64-${{ runner.os }}-${{ hashFiles('**/feeds.conf.default', '.config') }}"   # 包含 .config hash，变化时自动失效
          restore-keys: |
            ccache-openwrt-x86-64-${{ runner.os }}-

      - name: 钉钉通知 - 依赖安装完成
        if: always()
        uses: ghostoy/dingtalk-action@master
        with:
          webhook: ${{ secrets.DINGTALK_WEBHOOK }}
          secret: ${{ secrets.DINGTALK_SECRET }}
          msgtype: text
          content: |
            ✅ 依赖安装完成
            状态：${{ job.status }}
            耗时：约 ${{ steps.install-time.outputs.duration || '未知' }} 秒

      - name: 克隆 OpenWrt 源码及组件vlmcsd、filetransfer
        run: |
          BRANCH="${{ github.event.inputs.openwrt_branch || 'master' }}"
          git clone --depth=1 https://github.com/openwrt/openwrt.git -b $BRANCH openwrt

      - name: 添加 OpenClash feed
        run: |
          cd openwrt
          echo "src-git openclash https://github.com/vernesong/OpenClash.git" >> feeds.conf.default
          git clone https://github.com/flytosky-f/openwrt-vlmcsd.git ./package/chenxx/openwrt-vlmcsd
          # 确保 vlmcsd 包的版本字段符合 OpenWrt 的标准格式。
          # === 修复 vlmcsd 版本（关键！）===
          sed -i 's/^PKG_VERSION:=.*/PKG_VERSION:=1112/' ./package/chenxx/openwrt-vlmcsd/Makefile
          sed -i 's/^PKG_RELEASE:=.*/PKG_RELEASE:=1/' ./package/chenxx/openwrt-vlmcsd/Makefile
          git clone https://github.com/flytosky-f/luci-app-vlmcsd.git ./package/chenxx/luci-app-vlmcsd
          git clone https://github.com/zxl78585/luci-app-filetransfer.git ./package/chenxx/luci-app-filetransfer

      - name: 复制 config 并强制启用必要组件
        run: |
          cd openwrt

          CONFIG_FILE="../config.lede.X64"
          if [ -f "$CONFIG_FILE" ]; then
            cp "$CONFIG_FILE" .config
            echo "✅ 已加载 config.lede.X64"
          else
            echo "❌ 未找到 config.lede.X64，使用默认 x86_64 generic 配置"
            cat .config
            # cat > .config << 'EOF'
            # CONFIG_TARGET_x86=y
            # CONFIG_TARGET_x86_64=y
            # CONFIG_TARGET_x86_64_DEVICE_generic=y
            # EOF
          fi

          # 函数：强制启用某个包/配置项（覆盖 m → y，删除注释，新增 y）
          force_enable() {
            local key="$1"
            local value="$2"

            # 如果已经是 CONFIG_ 开头，就不加前缀；否则自动加 CONFIG_PACKAGE_
            if [[ "$key" == CONFIG_* ]]; then
              local full_key="$key"
            else
              local full_key="CONFIG_PACKAGE_${key}"
            fi

            if grep -q "^${full_key}=[ym]" .config; then
                sed -i "s/^${full_key}=[ym]/${full_key}=${value}/" .config
                echo "  → 已强制设置为 ${full_key}=${value}"
              elif grep -q "^# ${full_key} is not set" .config; then
                sed -i "s/^# ${full_key} is not set/${full_key}=${value}/" .config
                echo "  → 已强制启用（从注释改为） ${full_key}=${value}"
              else
                echo "${full_key}=${value}" >> .config
                echo "  → 新增 ${full_key}=${value}"
              fi
          }

          force_enable "CONFIG_TARGET_x86" "y"
          force_enable "CONFIG_TARGET_x86_64" "y"
          force_enable "CONFIG_TARGET_x86_64_DEVICE_generic" "y"
          # 强制启用 VMDK 镜像生成
          force_enable "CONFIG_VMDK_IMAGES" "y"

          # 其他必须组件
          force_enable "chinadns-ng"           "y"
          force_enable "mosdns"                "y"
          force_enable "luci-app-mosdns"       "y"
          force_enable "docker"                "y"
          force_enable "dockerd"               "y"
          force_enable "containerd"            "y"
          force_enable "runc"                  "y"
          force_enable "luci-app-dockerman"    "y"
          force_enable "luci-app-openclash"    "y"
          force_enable "kmod-wireguard"         "y"
          force_enable "wireguard-tools"        "y"
          force_enable "luci-proto-wireguard"   "y"
          force_enable "luci-app-wireguard"     "y"
          force_enable "kmod-usb-printer"       "y"

          # 新增：强制启用 open-vm-tools 及其相关模块
          force_enable "open-vm-tools"           "y"
          # force_enable "open-vm-tools-fuse"      "y"
          force_enable "luci-app-open-vm-tools"  "y"   # 如果需要 LuCI 界面再打开
          force_enable "kmod-vmware"             "y"
          force_enable "kmod-vmware-guest"       "y"
          force_enable "kmod-vmware-pvscsi"      "y"
          force_enable "kmod-vmware-vmci"        "y"
          force_enable "kmod-vmware-vsock"       "y"
          force_enable "kmod-vmware-balloon"     "y"
          force_enable "kmod-vmware-vmmemctl"    "y"
      
          echo "open-vm-tools 及其模块已强制启用"

          echo "所有强制启用操作完成"
          sed -i "s/set system\.\@system\[-1\]\.timezone='UTC'/set system.@system[-1].timezone='CST-8'/" ./package/base-files/files/bin/config_generate
          sed -i "s/0\.openwrt\.pool\.ntp\.org/ntp1.aliyun.com/" ./package/base-files/files/bin/config_generate
          sed -i "s/1\.openwrt\.pool\.ntp\.org/time1.cloud.tencent.com/" ./package/base-files/files/bin/config_generate
          echo "net.netfilter.nf_conntrack_max=65535" >> ./package/base-files/files/etc/sysctl.d/10-default.conf
          echo "net.ipv4.ip_forward = 1" >> ./package/base-files/files/etc/sysctl.d/10-default.conf

      - name: 生成配置 + 下载源码
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make download -j$(nproc) || make download V=s -j1   # 先并行下载，失败再详细重试
          # make download -j$(nproc)

      - name: 开始编译
        run: |
          cd openwrt
          # make -j$(nproc) V=s
          make -j$(nproc) IGNORE_ERRORS="n m" || make -j1 V=s   # 出错时给详细日志
          ccache -s
          
      # - name: 钉钉通知
      #   uses: ghostoy/dingtalk-action@master
      #   with:
      #     webhook: "https://oapi.dingtalk.com/robot/send?access_token=36a1e8b0ef6ba7ccddd320cfb9fceae841917ed4850a329aedc52f87d05a5877"
      #     msgtype: markdown
      #     content: |
      #       {
      #         "title": "github.workflow 通知：openWRT 自动编译",
      #         "text": "**自动编译固件** \n编译时间：$(date) \n "** <font color=#FFFF00 size=4>构建完成</font> **"
      #       }
      #     secret: "SECb72bffd2104d07454dc9754a6bf0a9f4fd1e8bf110de7b87d1f5af7a14e0598a"

      # ──────────────────────────────────────────────────────────────
      # 步骤：构建完成后处理（可选，推荐）
      # ──────────────────────────────────────────────────────────────
      # - name: Post-build - Compress VMDK if exists + list artifacts
      #   if: always()
      #   run: |
      #     cd openwrt/bin/targets/x86/64 || exit 0
      #     ls -lh *.img.gz *.vmdk 2>/dev/null || true
      #     if ls *.vmdk >/dev/null 2>&1; then
      #       pigz -9 -p $(nproc) *.vmdk || gzip -9 *.vmdk   # 尽量用 pigz 更快压缩
      #     fi
      #     sha256sum * > checksum.sha256
      #     ls -lh

      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-X64
          path: openwrt/bin/targets/x86/64/**
          retention-days: 7

      - name: 生成 SHA256 校验文件（仅固件）
        run: |
          TARGET_DIR="openwrt/bin/targets/x86/64"
          cd "$TARGET_DIR" || { echo "❌ 固件目录不存在"; exit 1; }

          echo "当前目录文件列表："
          ls -la

          find . -maxdepth 1 -type f \( \
            -name "*.img.gz" -o \
            -name "*.vmdk" -o \
            -name "*.squashfs*" -o \
            -name "openwrt-*.bin" -o \
            -name "*sysupgrade*" -o \
            -name "*.factory.*" \
          \) -exec sha256sum {} + > sha256sums.txt

          if [ -s sha256sums.txt ]; then
            echo "✅ sha256sums.txt 生成成功："
            cat sha256sums.txt
          else
            echo "⚠️ 没有找到可计算 SHA256 的固件文件"
            exit 1
          fi

      - name: 自动发布到 GitHub Releases
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            openwrt/bin/targets/x86/64/**
            openwrt/bin/targets/x86/64/sha256sums.txt
          tag_name: v${{ github.run_number }}
          name: OpenWrt X64 (MosDNS + Docker + OpenClash + VMDK) #${{ github.run_number }}
          body: |
            **自动编译固件**
            - 分支：${{ github.event.inputs.openwrt_branch || 'master' }}
            - 保留数量：${{ github.event.inputs.keep_releases }}
            - 已启用：VMDK 镜像生成、MosDNS 智能分流、Docker、OpenClash
            - 编译时间：$(date)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 自动清理旧 Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        run: |
          KEEP=${{ github.event.inputs.keep_releases || 5 }}
          echo "🧹 清理旧 Release，仅保留最近 $KEEP 个..."
          gh release list --limit 100 --json tagName --jq '.[].tagName' | tail -n +$((KEEP+1)) | xargs -I {} gh release delete {} --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: 上传编译日志（失败时保留）
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: build-log
      #     path: openwrt/.config
      #     retention-days: 1

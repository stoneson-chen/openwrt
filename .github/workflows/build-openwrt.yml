name: OpenWrt 自动编译（OpenClash + MosDNS + Docker）

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: 'OpenWrt 分支 (留空使用 master)'
        required: false
        default: ''
      release:
        description: '是否发布到 Releases'
        type: boolean
        default: true
      keep_releases:
        description: '保留最近几个 Release（默认 5）'
        required: false
        default: '5'
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # 必须，用于发布和删除 Release

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 480

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装依赖 + ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-setuptools python3-pysocks python3-unidecode \
            rsync swig unzip zlib1g-dev file wget ccache

      - name: 配置 ccache
        run: |
          ccache --max-size=5G
          echo "CCACHE_DIR=/home/runner/.ccache" >> $GITHUB_ENV
          echo "/usr/lib/ccache" >> $GITHUB_PATH

      - name: 缓存 ccache
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: openwrt-ccache-${{ github.sha }}
          restore-keys: openwrt-ccache-

      - name: 克隆 OpenWrt 源码
        run: |
          BRANCH="${{ github.event.inputs.openwrt_branch || 'master' }}"
          git clone --depth=1 https://github.com/openwrt/openwrt.git -b $BRANCH openwrt
          echo "✅ 使用分支: $BRANCH"
          df -h

      - name: 添加 OpenClash feed 并更新
        run: |
          cd openwrt
          echo "src-git openclash https://github.com/vernesong/OpenClash.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 复制并优化 config.lede.X64
        run: |
          cd openwrt
          cp ../config.lede.X64 .config || { echo "❌ config.lede.X64 不存在！"; exit 1; }

          cat >> .config << EOF
          CONFIG_PACKAGE_chinadns-ng=y
          CONFIG_PACKAGE_mosdns=y
          CONFIG_PACKAGE_luci-app-mosdns=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_containerd=y
          CONFIG_PACKAGE_runc=y
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-app-openclash=y
          EOF
          echo "✅ 已强制启用 ChinaDNS-NG + MosDNS + Docker + OpenClash"

      - name: 生成配置 + 下载源码
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc)

      - name: 开始编译
        run: |
          cd openwrt
          # make -j$(nproc) V=0
          make -j1 V=s 2>&1 | tee build.log || true
          ccache -s

      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-X64-MosDNS-Docker
          path: openwrt/bin/targets/x86/64/**
          retention-days: 30

      - name: 生成 SHA256 校验文件
        run: |
          cd openwrt/bin/targets/x86/64
          sha256sum * > sha256sums.txt

      - name: 自动发布到 GitHub Releases
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: openwrt/bin/targets/x86/64/**
          tag_name: v${{ github.run_number }}
          name: OpenWrt X64 (MosDNS + Docker + OpenClash) #${{ github.run_number }}
          body: |
            **自动编译固件**
            - 分支：${{ github.event.inputs.openwrt_branch || 'master' }}
            - 保留数量：${{ github.event.inputs.keep_releases }}
            - 编译时间：$(date)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 自动清理旧 Release（保留最近 ${{ github.event.inputs.keep_releases || 5 }} 个）
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        run: |
          KEEP=${{ github.event.inputs.keep_releases || 5 }}
          echo "🧹 开始清理旧 Release，仅保留最近 $KEEP 个..."

          # 获取所有 Release（按时间倒序）
          gh release list --limit 100 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[] | .tagName' > releases.txt

          # 跳过前 KEEP 个，删除其余
          tail -n +$((KEEP+1)) releases.txt | while read -r tag; do
            if [ -n "$tag" ]; then
              echo "🗑 删除旧 Release: $tag"
              gh release delete "$tag" --yes
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传编译日志（失败时保留）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: openwrt/.config
          retention-days: 7

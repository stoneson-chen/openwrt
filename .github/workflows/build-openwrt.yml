name: OpenWrt 自动编译（OpenClash + MosDNS + Docker + VMDK）

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: 'OpenWrt 分支 (留空使用 master)'
        required: false
        default: ''
      release:
        description: '是否发布到 Releases'
        type: boolean
        default: true
      keep_releases:
        description: '保留最近几个 Release（默认 5）'
        required: false
        default: '5'

  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 480

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装依赖 + ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget ccache

      - name: 配置 ccache
        run: |
          ccache --max-size=5G
          echo "CCACHE_DIR=/home/runner/.ccache" >> $GITHUB_ENV
          echo "/usr/lib/ccache" >> $GITHUB_PATH

      - name: 缓存 ccache
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: openwrt-ccache-${{ github.sha }}
          restore-keys: openwrt-ccache-

      - name: 克隆 OpenWrt 源码
        run: |
          BRANCH="${{ github.event.inputs.openwrt_branch || 'master' }}"
          git clone --depth=1 https://github.com/openwrt/openwrt.git -b $BRANCH openwrt

      - name: 添加 OpenClash feed
        run: |
          cd openwrt
          echo "src-git openclash https://github.com/vernesong/OpenClash.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 复制 config.lede.X64 并强制启用必要组件（含 VMDK）
        run: |
          cd openwrt

          CONFIG_FILE="../config.lede.X64"
          if [ -f "$CONFIG_FILE" ]; then
            cp "$CONFIG_FILE" .config
            echo "✅ 已加载 config.lede.X64"
          else
            echo "❌ 未找到 config.lede.X64，使用默认 x86_64 generic 配置"
            cat > .config << 'EOF'
            CONFIG_TARGET_x86=y
            CONFIG_TARGET_x86_64=y
            CONFIG_TARGET_x86_64_DEVICE_generic=y
            EOF
          fi

          # 函数：强制启用某个包/配置项（覆盖 m → y，删除注释，新增 y）
          force_enable() {
            local key="$1"
            local value="$2"

            if grep -q "^${key}=[ym]" .config; then
              sed -i "s/^${key}=[ym]/${key}=${value}/" .config
              echo "  → 已强制设置为 ${key}=${value}"
            elif grep -q "^# ${key} is not set" .config; then
              sed -i "/^# ${key} is not set/d" .config
              echo "${key}=${value}" >> .config
              echo "  → 已启用 ${key}=${value}（原为注释）"
            else
              echo "${key}=${value}" >> .config
              echo "  → 新增 ${key}=${value}"
            fi
          }

          # 强制启用 VMDK 镜像生成
          force_enable "CONFIG_VMDK_IMAGES" "y"

          # 其他必须组件
          force_enable "chinadns-ng"           "y"
          force_enable "mosdns"                "y"
          force_enable "luci-app-mosdns"       "y"
          force_enable "docker"                "y"
          force_enable "dockerd"               "y"
          force_enable "containerd"            "y"
          force_enable "runc"                  "y"
          force_enable "luci-app-dockerman"    "y"
          force_enable "luci-app-openclash"    "y"

          echo "所有强制启用操作完成"

      - name: 生成配置 + 下载源码
        run: |
          cd openwrt
          make defconfig
          make download -j$(nproc)

      - name: 开始编译
        run: |
          cd openwrt
          make -j$(nproc) V=s
          ccache -s

      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-X64-MosDNS-Docker-VMDK
          path: openwrt/bin/targets/x86/64/**
          retention-days: 7

      - name: 生成 SHA256 校验文件（仅固件）
        run: |
          TARGET_DIR="openwrt/bin/targets/x86/64"
          cd "$TARGET_DIR" || { echo "❌ 固件目录不存在"; exit 1; }

          echo "当前目录文件列表："
          ls -la

          find . -maxdepth 1 -type f \( \
            -name "*.img.gz" -o \
            -name "*.vmdk" -o \
            -name "*.squashfs*" -o \
            -name "openwrt-*.bin" -o \
            -name "*sysupgrade*" -o \
            -name "*.factory.*" \
          \) -exec sha256sum {} + > sha256sums.txt

          if [ -s sha256sums.txt ]; then
            echo "✅ sha256sums.txt 生成成功："
            cat sha256sums.txt
          else
            echo "⚠️ 没有找到可计算 SHA256 的固件文件"
            exit 1
          fi

      - name: 自动发布到 GitHub Releases
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            openwrt/bin/targets/x86/64/**
            openwrt/bin/targets/x86/64/sha256sums.txt
          tag_name: v${{ github.run_number }}
          name: OpenWrt X64 (MosDNS + Docker + OpenClash + VMDK) #${{ github.run_number }}
          body: |
            **自动编译固件**
            - 分支：${{ github.event.inputs.openwrt_branch || 'master' }}
            - 保留数量：${{ github.event.inputs.keep_releases }}
            - 已启用：VMDK 镜像生成、MosDNS 智能分流、Docker、OpenClash
            - 编译时间：$(date)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 自动清理旧 Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        run: |
          KEEP=${{ github.event.inputs.keep_releases || 5 }}
          echo "🧹 清理旧 Release，仅保留最近 $KEEP 个..."
          gh release list --limit 100 --json tagName --jq '.[].tagName' | tail -n +$((KEEP+1)) | xargs -I {} gh release delete {} --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传编译日志（失败时保留）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: openwrt/.config
          retention-days: 1
